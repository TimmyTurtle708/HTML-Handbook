<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reallusion HTML Email 工作手冊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf7f2;
  --bg-card: #ffffff;
  --ink: #1a1a1a;
  --ink-soft: #555;
  --ink-mute: #888;
  --line: #e8e3d8;
  --accent: #d94f2b;
  --accent-soft: #fde9e2;
  --gold: #c9a96e;
  --ok: #2d8659;
  --warn: #c07d20;
  --err: #c0392b;
  --code-bg: #0f1419;
  --code-ink: #e6e6e6;
  --shadow-sm: 0 1px 2px rgba(26,26,26,0.06);
  --shadow-md: 0 4px 12px rgba(26,26,26,0.08);
  --shadow-lg: 0 12px 40px rgba(26,26,26,0.12);
  --radius: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.7;
  font-size: 15px;
  min-height: 100vh;
  background-image:
    radial-gradient(circle at 20% 10%, rgba(217, 79, 43, 0.04) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(201, 169, 110, 0.05) 0%, transparent 50%);
}

code, pre, .mono { font-family: 'JetBrains Mono', monospace; }

/* ======== Header ======== */
header.hero {
  padding: 60px 40px 40px;
  border-bottom: 1px solid var(--line);
  background: var(--bg-card);
  position: relative;
  overflow: hidden;
}
header.hero::before {
  content: '';
  position: absolute;
  top: -50%; right: -10%;
  width: 400px; height: 400px;
  background: radial-gradient(circle, var(--accent-soft) 0%, transparent 70%);
  z-index: 0;
}
header.hero > * { position: relative; z-index: 1; }

.hero-eyebrow {
  font-size: 12px;
  letter-spacing: 0.2em;
  color: var(--accent);
  font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.hero h1 {
  font-size: 38px;
  font-weight: 900;
  letter-spacing: -0.02em;
  color: var(--ink);
  margin-bottom: 10px;
}
.hero p.sub {
  font-size: 15px;
  color: var(--ink-soft);
  max-width: 600px;
}

.hero-meta {
  display: flex;
  gap: 20px;
  margin-top: 24px;
  font-size: 13px;
  color: var(--ink-mute);
  flex-wrap: wrap;
  align-items: center;
}
.hero-meta span { display: inline-flex; align-items: center; gap: 6px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); display: inline-block; }
.dot.warn { background: var(--warn); }
.dot.err { background: var(--err); }
.dot.idle { background: var(--ink-mute); }

/* ======== Toolbar ======== */
.toolbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(250, 247, 242, 0.95);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);
  padding: 12px 40px;
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}
.btn {
  padding: 8px 16px;
  border: 1px solid var(--line);
  background: var(--bg-card);
  color: var(--ink);
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn:hover { border-color: var(--ink); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
.btn.primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.btn.primary:hover { background: var(--accent); border-color: var(--accent); }
.btn.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.accent:hover { background: #b83e1f; }
.btn.ghost { background: transparent; border-color: transparent; }
.btn.ghost:hover { background: var(--bg-card); border-color: var(--line); }
.btn.sm { padding: 6px 12px; font-size: 12px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.sync-indicator {
  margin-left: auto;
  padding: 6px 12px;
  font-size: 12px;
  color: var(--ink-mute);
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'JetBrains Mono', monospace;
}

/* ======== Navigation Tabs ======== */
.tabs {
  display: flex;
  gap: 0;
  padding: 0 40px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--line);
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 14px 20px;
  font-size: 14px;
  font-weight: 500;
  color: var(--ink-soft);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all 0.15s;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
  font-family: inherit;
}
.tab:hover { color: var(--ink); }
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 700;
}

/* ======== Main content ======== */
main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px;
}

.panel { display: none; animation: fadeIn 0.3s ease; }
.panel.active { display: block; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.section-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--line);
  gap: 12px;
  flex-wrap: wrap;
}
.section-head h2 {
  font-size: 24px;
  font-weight: 900;
  letter-spacing: -0.01em;
}
.section-head .subhead {
  font-size: 13px;
  color: var(--ink-mute);
}

/* ======== Block cards ======== */
.blocks-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.block-card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px;
  transition: all 0.2s;
  position: relative;
  box-shadow: var(--shadow-sm);
}
.block-card:hover {
  border-color: var(--ink);
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}
.block-card h3 {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 10px;
  color: var(--ink);
}
.block-card .desc {
  font-size: 13px;
  color: var(--ink-soft);
  margin-bottom: 12px;
  line-height: 1.6;
}
.block-card pre {
  background: var(--code-bg);
  color: var(--code-ink);
  padding: 12px;
  border-radius: 6px;
  font-size: 12px;
  line-height: 1.5;
  overflow-x: auto;
  max-height: 200px;
}
.card-actions {
  display: flex;
  gap: 6px;
  margin-top: 12px;
  opacity: 0;
  transition: opacity 0.15s;
}
.block-card:hover .card-actions { opacity: 1; }

/* ======== Syntax table ======== */
.syn-group { margin-bottom: 28px; }
.syn-group h3 {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--accent);
  display: inline-block;
}
.syn-rows { display: flex; flex-direction: column; gap: 8px; }
.syn-row {
  display: grid;
  grid-template-columns: 200px 1fr auto;
  gap: 16px;
  padding: 10px 14px;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 8px;
  align-items: center;
  transition: all 0.15s;
}
.syn-row:hover { border-color: var(--ink); }
.syn-row code {
  background: transparent;
  color: var(--accent);
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
  transition: background 0.15s;
}
.syn-row code:hover { background: var(--accent-soft); }
.syn-row .label { font-size: 13px; color: var(--ink-soft); }

/* ======== Notes / Checklist / Tutorial ======== */
.note-card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
}
.note-card h3 {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 8px;
}
.note-card .note-body {
  font-size: 14px;
  color: var(--ink-soft);
  white-space: pre-wrap;
  word-wrap: break-word;
}
.note-card img {
  max-width: 100%;
  border-radius: 6px;
  margin-top: 10px;
  border: 1px solid var(--line);
}

.check-item {
  display: flex;
  gap: 12px;
  padding: 12px 16px;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 8px;
  margin-bottom: 8px;
  align-items: flex-start;
}
.check-item input[type="checkbox"] {
  width: 18px; height: 18px;
  margin-top: 2px;
  cursor: pointer;
  accent-color: var(--accent);
}
.check-item.done { opacity: 0.5; }
.check-item.done .check-text { text-decoration: line-through; }
.check-text { flex: 1; font-size: 14px; }
.check-actions { display: flex; gap: 4px; }

.tut-section { margin-bottom: 32px; }
.tut-section > h3 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 14px;
  padding: 8px 14px;
  background: var(--ink);
  color: var(--bg);
  border-radius: 6px;
  display: inline-block;
}
.tut-item {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-sm);
}
.tut-item h4 {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--accent);
}
.tut-item .tut-body {
  font-size: 14px;
  color: var(--ink-soft);
  white-space: pre-wrap;
  word-wrap: break-word;
}

.add-btn {
  width: 100%;
  padding: 12px;
  border: 2px dashed var(--line);
  background: transparent;
  color: var(--ink-mute);
  border-radius: var(--radius);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  margin-top: 8px;
}
.add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

/* ======== Editor / Modal ======== */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(26, 26, 26, 0.5);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
}
.overlay.open { display: flex; animation: fadeIn 0.2s; }
.modal {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 28px;
  max-width: 600px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: modalIn 0.25s ease;
}
@keyframes modalIn {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.modal-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
}
.modal-head h3 { font-size: 18px; font-weight: 700; }
.close-x {
  background: none;
  border: none;
  font-size: 24px;
  color: var(--ink-mute);
  cursor: pointer;
  line-height: 1;
  padding: 4px 8px;
}
.close-x:hover { color: var(--ink); }
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 6px;
  color: var(--ink-soft);
}
.form-group input,
.form-group textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 6px;
  font-size: 14px;
  font-family: inherit;
  background: var(--bg);
  transition: border-color 0.15s;
}
.form-group input:focus,
.form-group textarea:focus { outline: none; border-color: var(--accent); }
.form-group textarea { min-height: 100px; resize: vertical; font-family: 'JetBrains Mono', monospace; }
.form-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px solid var(--line);
}

/* ======== Toast ======== */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--ink);
  color: var(--bg);
  padding: 14px 24px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  z-index: 2000;
  box-shadow: var(--shadow-lg);
  transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.2);
  pointer-events: none;
  max-width: 80vw;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.ok { background: var(--ok); }
.toast.err { background: var(--err); }
.toast.warn { background: var(--warn); }

/* ======== GitHub Panel ======== */
.gh-panel .modal { max-width: 520px; }
.gh-status {
  margin-top: 10px;
  padding: 10px 12px;
  border-radius: 6px;
  font-size: 13px;
  display: none;
}
.gh-status.show { display: block; }
.gh-status.ok { background: #e8f5ed; color: var(--ok); }
.gh-status.err { background: #fbeae7; color: var(--err); }
.gh-status.warn { background: #fef4e5; color: var(--warn); }
.token-row { display: flex; gap: 6px; }
.token-row input { flex: 1; }

/* ======== Edit mode ======== */
body.edit-mode .block-card { border-color: var(--accent); }
body.edit-mode .note-card,
body.edit-mode .tut-item,
body.edit-mode .syn-row { border-color: var(--accent); }

.editable-on-hover { cursor: pointer; }
body.edit-mode .editable-on-hover:hover { background: var(--accent-soft); outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

/* ======== Responsive ======== */
@media (max-width: 768px) {
  header.hero { padding: 32px 20px 24px; }
  .hero h1 { font-size: 28px; }
  .toolbar { padding: 10px 16px; }
  .tabs { padding: 0 16px; }
  main { padding: 24px 16px; }
  .syn-row { grid-template-columns: 1fr; gap: 4px; }
  .blocks-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-eyebrow">Reallusion · Internal Handbook</div>
  <h1>HTML Email 工作手冊</h1>
  <p class="sub">一份給電子報產製工作者的協作手冊 · 可編輯 · 可同步</p>
  <div class="hero-meta">
    <span><span class="dot idle" id="syncDot"></span><span id="syncText">未連線 GitHub</span></span>
    <span>·</span>
    <span id="updateTime">載入中…</span>
  </div>
</header>

<div class="toolbar">
  <button class="btn" id="editToggleBtn" onclick="toggleEditMode()">✏️ 開始編輯</button>
  <button class="btn ghost" onclick="openGHPanel()">⚙️ GitHub 設定</button>
  <button class="btn ghost" onclick="openVersionPanel()">🕐 歷史版本</button>
  <button class="btn ghost" onclick="exportData()">📥 匯出</button>
  <div class="sync-indicator" id="syncIndicator">就緒</div>
</div>

<div class="tabs">
  <button class="tab active" data-panel="blocks" onclick="switchTab('blocks')">區塊範本</button>
  <button class="tab" data-panel="syntax" onclick="switchTab('syntax')">語法速查</button>
  <button class="tab" data-panel="notes" onclick="switchTab('notes')">筆記</button>
  <button class="tab" data-panel="checklist" onclick="switchTab('checklist')">檢查清單</button>
  <button class="tab" data-panel="tutorial" onclick="switchTab('tutorial')">教學 / 檔案過工</button>
</div>

<main>
  <!-- 區塊範本 -->
  <section class="panel active" data-panel="blocks">
    <div class="section-head">
      <h2>區塊範本</h2>
      <div class="subhead">常用的 HTML Email 模組，可複製或編輯</div>
    </div>
    <div class="blocks-grid" id="blocksGrid"></div>
    <button class="add-btn" onclick="openBlockEditor()">＋ 新增區塊</button>
  </section>

  <!-- 語法速查 -->
  <section class="panel" data-panel="syntax">
    <div class="section-head">
      <h2>語法速查</h2>
      <div class="subhead">點擊 CSS 片段可複製到剪貼簿</div>
    </div>
    <div id="synContainer"></div>
    <button class="add-btn" onclick="addSynGroup()">＋ 新增分類</button>
  </section>

  <!-- 筆記 -->
  <section class="panel" data-panel="notes">
    <div class="section-head">
      <h2>工作筆記</h2>
      <div class="subhead">記下踩雷、小技巧與心得</div>
    </div>
    <div id="notesContainer"></div>
    <button class="add-btn" onclick="openNoteEditor()">＋ 新增筆記</button>
  </section>

  <!-- 檢查清單 -->
  <section class="panel" data-panel="checklist">
    <div class="section-head">
      <h2>出稿檢查清單</h2>
      <div class="subhead">寄出前逐項確認</div>
    </div>
    <div id="checkContainer"></div>
    <button class="add-btn" onclick="addCheckItem()">＋ 新增項目</button>
  </section>

  <!-- 教學 / 檔案過工 -->
  <section class="panel" data-panel="tutorial">
    <div class="section-head">
      <h2>教學 / 檔案過工</h2>
      <div class="subhead">流程說明與 SOP</div>
    </div>
    <div id="tutContainer"></div>
    <button class="add-btn" onclick="addTutSection()">＋ 新增章節</button>
  </section>
</main>

<!-- GitHub 設定面板 -->
<div class="overlay gh-panel" id="ghOverlay" onclick="handleGHBg(event)">
  <div class="modal">
    <div class="modal-head">
      <h3>⚙️ GitHub 連線設定</h3>
      <button class="close-x" onclick="closeGHPanel()">×</button>
    </div>
    <div class="form-group">
      <label>Personal Access Token（需 repo 權限）</label>
      <div class="token-row">
        <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx">
        <button class="btn sm" id="togglePwBtn" onclick="toggleTokenVis()">顯示</button>
      </div>
    </div>
    <div class="form-group">
      <label>使用者名稱</label>
      <input type="text" id="ghOwner" placeholder="TimmyTurtle708">
    </div>
    <div class="form-group">
      <label>Repository 名稱</label>
      <input type="text" id="ghRepo" placeholder="HTML-Handbook">
    </div>
    <div class="form-group">
      <label>資料檔名（建議：data.json）</label>
      <input type="text" id="ghDataFile" placeholder="data.json" value="data.json">
    </div>
    <div class="gh-status" id="ghStatus"></div>
    <div class="form-actions">
      <button class="btn" onclick="closeGHPanel()">取消</button>
      <button class="btn primary" onclick="saveGHSettings()">儲存並驗證</button>
    </div>
  </div>
</div>

<!-- 版本歷史面板 -->
<div class="overlay" id="versionOverlay" onclick="handleVersionBg(event)">
  <div class="modal">
    <div class="modal-head">
      <h3>🕐 歷史版本</h3>
      <button class="close-x" onclick="closeVersionPanel()">×</button>
    </div>
    <p style="font-size:13px;color:var(--ink-mute);margin-bottom:14px;">每次同步會自動保留最近 10 個版本。點選可回復。</p>
    <div id="versionList"></div>
  </div>
</div>

<!-- 通用編輯器 -->
<div class="overlay" id="editorOverlay" onclick="handleEditorBg(event)">
  <div class="modal">
    <div class="modal-head">
      <h3 id="editorTitle">編輯</h3>
      <button class="close-x" onclick="closeEditor()">×</button>
    </div>
    <div id="editorBody"></div>
    <div class="form-actions">
      <button class="btn" onclick="closeEditor()">取消</button>
      <button class="btn accent" id="editorDeleteBtn" style="display:none;" onclick="editorDelete()">刪除</button>
      <button class="btn primary" onclick="editorSave()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// 資料管理（全部存在 data.json，不碰 HTML）
// ============================================================
const DEFAULT_DATA = {
  blocks: [
    { id: 'b1', title: 'Header 頭圖', desc: 'Email 最上方的頭圖區塊，通常是主視覺', code: '<table width="600" cellpadding="0" cellspacing="0" border="0">\n  <tr><td align="center">\n    <img src="header.jpg" width="600" style="display:block;">\n  </td></tr>\n</table>' },

let DATA = structuredClone(DEFAULT_DATA);
let EDIT_MODE = false;
let EDITOR_CTX = null; // 當前編輯的項目上下文
let SYNC_DEBOUNCE = null;
let PENDING_SYNC = false;

// ============================================================
// LocalStorage（離線副本）
// ============================================================
const LS_DATA = 'rl_handbook_data_v7';
const LS_GH = 'rl_handbook_gh_v7';
const LS_VERSIONS = 'rl_handbook_versions_v7';

function saveLocal() {
  DATA.meta.updatedAt = Date.now();
  try { localStorage.setItem(LS_DATA, JSON.stringify(DATA)); } catch(e) {}
}
function loadLocal() {
  try {
    const s = localStorage.getItem(LS_DATA);
    if (s) DATA = JSON.parse(s);
  } catch(e) {}
}

// ============================================================
// GitHub 設定
// ============================================================
function getGH() {
  try { return JSON.parse(localStorage.getItem(LS_GH) || '{}'); }
  catch(e) { return {}; }
}
function hasGH() {
  const g = getGH();
  return !!(g.token && g.owner && g.repo);
}

function openGHPanel() {

  document.getElementById('ghOwner').value = g.owner || '';

}
function closeGHPanel() {

}
function handleGHBg(e) {

function toggleTokenVis() {

  else { inp.type = 'password'; btn.textContent = '顯示'; }

async function saveGHSettings() {
  const token = document.getElementById('ghToken').value.trim();
  const owner = document.getElementById('ghOwner').value.trim();
  const repo = document.getElementById('ghRepo').value.trim();
  const dataFile = document.getElementById('ghDataFile').value.trim() || 'data.json';
  const statusEl = document.getElementById('ghStatus');

  if (!token || !owner || !repo) {
    statusEl.className = 'gh-status show err';
    statusEl.textContent = '⚠️ 請填寫所有欄位';
    return;
  }

  statusEl.className = 'gh-status show warn';
  statusEl.textContent = '🔐 驗證中…';

  try {
    const res = await fetch(`https://api.github.com/repos/${owner}/${repo}`, {
      headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.message || `狀態 ${res.status}`);
    }
    const data = await res.json();
    localStorage.setItem(LS_GH, JSON.stringify({ token, owner, repo, dataFile }));
    statusEl.className = 'gh-status show ok';
    statusEl.textContent = `✅ 連線成功 · ${data.full_name}`;
    updateSyncIndicator('idle');
    setTimeout(() => closeGHPanel(), 1200);
  } catch(e) {
    statusEl.className = 'gh-status show err';
    statusEl.textContent = `❌ ${e.message}`;
  }
}

// ============================================================
// 同步（只同步 data.json，超快超輕）
// ============================================================
function updateSyncIndicator(state, text) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  const ind = document.getElementById('syncIndicator');
  const map = {
    idle: { cls: 'dot idle', label: '已連線 · 閒置', ind: '就緒' },
    syncing: { cls: 'dot warn', label: '同步中…', ind: '⬆️ 上傳中…' },
    ok: { cls: 'dot', label: '已同步', ind: '✅ 已同步' },
    err: { cls: 'dot err', label: '同步失敗', ind: '❌ 失敗' },
    offline: { cls: 'dot idle', label: '未連線 GitHub', ind: '離線模式' }
  };
  const m = map[state] || map.idle;
  dot.className = m.cls;
  txt.textContent = text || m.label;
  ind.textContent = m.ind;
}

// 從 GitHub 拉取 data.json（頁面載入時用）
async function pullFromGitHub() {
  if (!hasGH()) return false;
  const g = getGH();
  try {
    const url = `https://api.github.com/repos/${g.owner}/${g.repo}/contents/${g.dataFile}?_=${Date.now()}`;
    const res = await fetch(url, {
      headers: { 'Authorization': `Bearer ${g.token}`, 'Accept': 'application/vnd.github.v3+json' },
      cache: 'no-store'
    });
    if (res.status === 404) return false; // 檔案還沒建立
    if (!res.ok) throw new Error(`狀態 ${res.status}`);
    const fileData = await res.json();
    const binary = atob(fileData.content.replace(/\n/g, ''));
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const text = new TextDecoder('utf-8').decode(bytes);
    const parsed = JSON.parse(text);
    // 本地版本較新才不覆蓋
    const localUpdated = DATA.meta?.updatedAt || 0;
    const remoteUpdated = parsed.meta?.updatedAt || 0;
    if (remoteUpdated >= localUpdated) {
      DATA = parsed;
      saveLocal();
    }
    window._lastSha = fileData.sha;
    return true;
  } catch(e) {
    console.warn('[pull] 失敗:', e);
    return false;
  }
}

// 推送 data.json 到 GitHub（防抖 + sha 自動更新 + 單次執行保護）
function scheduleSync() {
  if (!hasGH()) return;
  PENDING_SYNC = true;
  clearTimeout(SYNC_DEBOUNCE);
  updateSyncIndicator('syncing', '待同步…');
  SYNC_DEBOUNCE = setTimeout(() => {
    doSync();
  }, 1500); // 1.5 秒內的多次修改會合併成一次推送
}

let SYNCING = false;
async function doSync() {
  if (!hasGH() || SYNCING) return;
  SYNCING = true;
  PENDING_SYNC = false;
  updateSyncIndicator('syncing');
  const g = getGH();
  const url = `https://api.github.com/repos/${g.owner}/${g.repo}/contents/${g.dataFile}`;

  try {
    // 1. 先取得最新 sha（每次都重新取得，避免 409 衝突）
    let sha = '';
    try {
      const getRes = await fetch(`${url}?_=${Date.now()}`, {
        headers: { 'Authorization': `Bearer ${g.token}`, 'Accept': 'application/vnd.github.v3+json' },
        cache: 'no-store'
      });
      if (getRes.ok) {
        const fd = await getRes.json();
        sha = fd.sha;
      }
    } catch(e) {}

    // 2. 推送
    DATA.meta.updatedAt = Date.now();
    DATA.meta.version = (DATA.meta.version || 0) + 1;
    const jsonStr = JSON.stringify(DATA, null, 2);
    const bytes = new TextEncoder().encode(jsonStr);
    let binary = '';
    bytes.forEach(b => binary += String.fromCharCode(b));
    const base64 = btoa(binary);

    const putRes = await fetch(url, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${g.token}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: `📝 更新 v${DATA.meta.version} · ${new Date().toLocaleString('zh-TW')}`,
        content: base64,
        ...(sha ? { sha } : {})
      })
    });

    if (!putRes.ok) {
      const errData = await putRes.json().catch(() => ({}));
      throw new Error(errData.message || `狀態 ${putRes.status}`);
    }

    const result = await putRes.json();
    window._lastSha = result.content.sha;

    // 3. 存快照到本地歷史
    saveVersionSnapshot();

    updateSyncIndicator('ok');
    showToast('✅ 已同步到 GitHub', 'ok');
    setTimeout(() => updateSyncIndicator('idle'), 2000);
  } catch(e) {
    console.error('[sync] 失敗:', e);
    updateSyncIndicator('err');
    showToast(`❌ 同步失敗：${e.message}`, 'err');
    setTimeout(() => updateSyncIndicator('idle'), 3000);
  } finally {
    SYNCING = false;
    // 如果在同步期間又有新變更，再觸發一次
    if (PENDING_SYNC) scheduleSync();
  }
}

// ============================================================
// 版本歷史
// ============================================================
function saveVersionSnapshot() {
  try {
    const versions = JSON.parse(localStorage.getItem(LS_VERSIONS) || '[]');
    versions.unshift({ ts: Date.now(), version: DATA.meta.version, data: DATA });
    // 只留最近 10 筆
    if (versions.length > 10) versions.length = 10;
    localStorage.setItem(LS_VERSIONS, JSON.stringify(versions));
  } catch(e) {}
}

function openVersionPanel() {
  const list = document.getElementById('versionList');
  try {
    const versions = JSON.parse(localStorage.getItem(LS_VERSIONS) || '[]');
    if (versions.length === 0) {
      list.innerHTML = '<p style="color:var(--ink-mute);text-align:center;padding:20px;">尚無歷史版本</p>';
    } else {
      list.innerHTML = versions.map((v, i) => `
        <div class="note-card" style="margin-bottom:8px;">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div>
              <strong>v${v.version}</strong>
              <span style="color:var(--ink-mute);font-size:12px;margin-left:8px;">${new Date(v.ts).toLocaleString('zh-TW')}</span>
            </div>
            <button class="btn sm" onclick="restoreVersion(${i})">回復此版本</button>
          </div>
        </div>
      `).join('');
    }
  } catch(e) { list.innerHTML = '<p>讀取失敗</p>'; }
  document.getElementById('versionOverlay').classList.add('open');
}
function closeVersionPanel() { document.getElementById('versionOverlay').classList.remove('open'); }
function handleVersionBg(e) { if (e.target.id === 'versionOverlay') closeVersionPanel(); }

function restoreVersion(index) {
  if (!confirm('確定要回復到這個版本嗎？當前變更會被覆蓋。')) return;
  try {
    const versions = JSON.parse(localStorage.getItem(LS_VERSIONS) || '[]');
    DATA = versions[index].data;
    saveLocal();
    renderAll();
    scheduleSync();
    closeVersionPanel();
    showToast('✅ 已回復到該版本', 'ok');
  } catch(e) { showToast('回復失敗', 'err'); }
}

function exportData() {
  const blob = new Blob([JSON.stringify(DATA, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `handbook-v${DATA.meta.version}-${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📥 已匯出 JSON', 'ok');
}

  const text = prompt('新增檢查項目：');
  if (!text) return;
  DATA.checklist.push({ id: 'c' + Date.now(), text, done: false });
  saveLocal(); renderCheck(); scheduleSync();
}
function editCheckItem(id) {
  const item = DATA.checklist.find(c => c.id === id);
  if (!item) return;
  const text = prompt('修改項目文字：', item.text);
  if (text === null) return;
  item.text = text;
  saveLocal(); renderCheck(); scheduleSync();
}
function deleteCheck(id) {
  if (!confirm('刪除此項目？')) return;
  DATA.checklist = DATA.checklist.filter(c => c.id !== id);
  saveLocal(); renderCheck(); scheduleSync();
}

// ============================================================
// Render：教學
// ============================================================
function renderTut() {
  const c = document.getElementById('tutContainer');
  c.innerHTML = DATA.tutorial.map((s, si) => `
    <div class="tut-section">
      <h3>${escapeHtml(s.title)}${EDIT_MODE ? `<button class="btn sm ghost" onclick="deleteTutSection('${s.id}')" style="margin-left:8px;">✕</button>` : ''}</h3>
      ${s.items.map(it => `
        <div class="tut-item">
          <h4>${escapeHtml(it.title)}</h4>
          <div class="tut-body">${escapeHtml(it.body)}</div>
          ${EDIT_MODE ? `<div class="card-actions" style="opacity:1;margin-top:8px;">
            <button class="btn sm" onclick="editTutItem('${s.id}','${it.id}')">編輯</button>
            <button class="btn sm" onclick="deleteTutItem('${s.id}','${it.id}')">刪除</button>
          </div>` : ''}
        </div>
      `).join('')}
      ${EDIT_MODE ? `<button class="btn sm ghost" onclick="addTutItem('${s.id}')" style="margin-top:8px;">＋ 新增步驟</button>` : ''}
    </div>
  `).join('');
}
function addTutSection() {
  const title = prompt('新章節標題？');
  if (!title) return;
  DATA.tutorial.push({ id: 't' + Date.now(), title, items: [] });
  saveLocal(); renderTut(); scheduleSync();
}
function deleteTutSection(id) {
  if (!confirm('刪除整個章節？')) return;
  DATA.tutorial = DATA.tutorial.filter(s => s.id !== id);
  saveLocal(); renderTut(); scheduleSync();
}
function addTutItem(sid) {
  const title = prompt('步驟標題？');
  if (!title) return;
  const body = prompt('步驟內容？');
  if (body === null) return;
  const s = DATA.tutorial.find(x => x.id === sid);
  if (s) { s.items.push({ id: 'ti' + Date.now(), title, body }); saveLocal(); renderTut(); scheduleSync(); }
}
function editTutItem(sid, iid) {
  const s = DATA.tutorial.find(x => x.id === sid);
  const it = s?.items.find(x => x.id === iid);
  if (!it) return;
  const title = prompt('標題：', it.title);
  if (title === null) return;
  const body = prompt('內容：', it.body);
  if (body === null) return;
  it.title = title; it.body = body;
  saveLocal(); renderTut(); scheduleSync();
}
function deleteTutItem(sid, iid) {
  if (!confirm('刪除此步驟？')) return;
  const s = DATA.tutorial.find(x => x.id === sid);
  if (s) { s.items = s.items.filter(i => i.id !== iid); saveLocal(); renderTut(); scheduleSync(); }
}

// ============================================================
// 通用編輯器儲存/刪除
// ============================================================
function editorSave() {
  if (!EDITOR_CTX) return;
  if (EDITOR_CTX.type === 'block') {
    const title = document.getElementById('f_title').value.trim();
    const desc = document.getElementById('f_desc').value.trim();
    const code = document.getElementById('f_code').value;
    if (!title) { showToast('標題不可為空', 'err'); return; }
    if (EDITOR_CTX.id) {
      const b = DATA.blocks.find(x => x.id === EDITOR_CTX.id);
      if (b) { b.title = title; b.desc = desc; b.code = code; }
    } else {
      DATA.blocks.push({ id: 'b' + Date.now(), title, desc, code });
    }
    saveLocal(); renderBlocks();
  } else if (EDITOR_CTX.type === 'note') {
    const title = document.getElementById('f_title').value.trim();
    const body = document.getElementById('f_body').value;
    if (!title) { showToast('標題不可為空', 'err'); return; }
    if (EDITOR_CTX.id) {
      const n = DATA.notes.find(x => x.id === EDITOR_CTX.id);
      if (n) { n.title = title; n.body = body; }
    } else {
      DATA.notes.push({ id: 'n' + Date.now(), title, body });
    }
    saveLocal(); renderNotes();
  }
  scheduleSync();
  closeEditor();
  showToast('✅ 已儲存', 'ok');
}
function editorDelete() {
  if (!EDITOR_CTX?.id) return;
  if (!confirm('確定刪除？')) return;
  if (EDITOR_CTX.type === 'block') {
    DATA.blocks = DATA.blocks.filter(b => b.id !== EDITOR_CTX.id);
    saveLocal(); renderBlocks();
  } else if (EDITOR_CTX.type === 'note') {
    DATA.notes = DATA.notes.filter(n => n.id !== EDITOR_CTX.id);
    saveLocal(); renderNotes();
  }
  scheduleSync();
  closeEditor();
  showToast('🗑️ 已刪除', 'ok');
}
function closeEditor() {
  document.getElementById('editorOverlay').classList.remove('open');
  EDITOR_CTX = null;
}
function handleEditorBg(e) { if (e.target.id === 'editorOverlay') closeEditor(); }

// ============================================================
// Utilities
// ============================================================
function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}
function escapeAttr(str) {
  return escapeHtml(str);
}

// ============================================================
// Render 全部
// ============================================================
function renderAll() {
  renderBlocks();
  renderSyntax();
  renderNotes();
  renderCheck();
  renderTut();
  updateMeta();
}
function updateMeta() {
  const t = document.getElementById('updateTime');
  const d = new Date(DATA.meta.updatedAt);
  t.textContent = `最後更新 ${d.toLocaleString('zh-TW')} · v${DATA.meta.version}`;
}

// ============================================================
// 啟動
// ============================================================
async function init() {
  loadLocal();
  renderAll();

  if (hasGH()) {
    updateSyncIndicator('syncing', '拉取最新資料…');
    const ok = await pullFromGitHub();
    if (ok) {
      renderAll();
      updateSyncIndicator('idle');
      showToast('✅ 已載入最新資料', 'ok');
    } else {
      updateSyncIndicator('idle');
    }
  } else {
    updateSyncIndicator('offline');
  }
}

init();
</script>
