<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reallusion HTML Email 工作手冊 v4</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:17px;line-height:1.7}

/* ===== Sticky Header ===== */
.site-header{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #e5e5e2;box-shadow:0 1px 8px rgba(0,0,0,.06)}
.header-inner{max-width:980px;margin:0 auto;padding:0 16px}
.header-top{display:flex;align-items:center;gap:12px;padding:10px 0 0}
.site-title{font-size:16px;font-weight:600;color:#1a1a1a;white-space:nowrap}
.global-search{flex:1;max-width:260px;padding:6px 12px;border:1px solid #e5e5e2;border-radius:20px;background:#f5f5f3;color:#1a1a1a;font-size:13px;outline:none;transition:border-color .15s}
.global-search:focus{border-color:#bbb;background:#fff}
.main-tabs{display:flex;gap:4px;padding:8px 0 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.main-tabs::-webkit-scrollbar{display:none}
.mtab{padding:7px 16px;border:none;border-radius:8px 8px 0 0;background:transparent;color:#888;font-size:14px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s}
.mtab:hover{color:#1a1a1a;background:#f5f5f3}
.mtab.active{color:#1a1a1a;font-weight:500;border-bottom:2px solid #1a1a1a;background:transparent}

/* Sub tabs */
.sub-bar{background:#f0f0ed;border-top:1px solid #e5e5e2;max-width:100%;padding:7px 0;display:none;align-items:center;gap:6px;flex-wrap:wrap}
.sub-bar-inner{max-width:980px;margin:0 auto;padding:0 16px;display:flex;gap:6px;flex-wrap:wrap}
.sub-bar.visible{display:block}
.stab{padding:4px 14px;border:none;border-radius:20px;background:transparent;color:#666;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .15s}
.stab:hover{background:rgba(0,0,0,.07);color:#1a1a1a}
.stab.active{background:#fff;color:#1a1a1a;font-weight:500;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.subpage{display:block;width:100%;overflow:hidden}

.wrap{max-width:980px;margin:0 auto;padding:20px 16px}
.page{display:none}.page.active{display:block}

/* ===== 快速語法表格 ===== */
.syntax-table{width:100%;border-collapse:collapse;font-size:14px;background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e5e5e2}
.syntax-table th{padding:9px 14px;text-align:left;font-size:12px;font-weight:500;color:#888;background:#f9f9f7;border-bottom:1px solid #e5e5e2;letter-spacing:.04em;text-transform:uppercase}
.syntax-table td{padding:8px 14px;border-bottom:1px solid #f0f0ec;vertical-align:middle}
.syntax-table tr:last-child td{border-bottom:none}
.syntax-table tr:hover td{background:#fafaf8}
.syn-name{font-size:14px;font-weight:500;color:#1a1a1a;white-space:nowrap}
.syn-code{font-family:'SF Mono',Consolas,monospace;font-size:12px;color:#555;background:#f5f5f3;padding:3px 7px;border-radius:5px;cursor:pointer;border:1px solid #e5e5e2;display:inline-block;max-width:420px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle}
.syn-code:hover{background:#ebebeb;border-color:#ccc}
.syn-note{font-size:12px;color:#aaa;white-space:nowrap}
.section-lbl{font-size:12px;font-weight:500;color:#888;margin:20px 0 8px}

/* ===== 區塊語法庫 — icon 化 ===== */
.block-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.bcard{background:#fff;border:1px solid #e5e5e2;border-radius:12px;overflow:hidden}
.bcard:hover{border-color:#ccc}
.bcard-thumb{width:100%;aspect-ratio:16/9;background:#f5f5f3;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;cursor:pointer}
.bcard-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .25s}
.bcard:hover .bcard-thumb img{transform:scale(1.03)}
.bcard-thumb-ph{display:flex;flex-direction:column;align-items:center;gap:5px;color:#ccc;font-size:12px;pointer-events:none}
/* 上傳 icon — 懸浮在縮圖右上角 */
.bcard-upload-btn{position:absolute;top:7px;right:7px;width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,.88);border:1px solid rgba(0,0,0,.1);display:none;align-items:center;justify-content:center;cursor:pointer;color:#555;transition:background .15s}
.bcard-thumb:hover .bcard-upload-btn{display:flex}
.bcard-upload-btn:hover{background:#fff}
.bcard-upload-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}
/* 刪除圖 icon */
.bcard-del-btn{position:absolute;top:7px;left:7px;width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,.88);border:1px solid rgba(0,0,0,.1);display:none;align-items:center;justify-content:center;cursor:pointer;color:#E24B4A;transition:background .15s}
.bcard-thumb:hover .bcard-del-btn{display:flex}
.bcard-del-btn:hover{background:#fff}
.bcard-strip{height:3px}
.bcard-body{padding:10px 12px 12px}
.bcard-title{font-size:14px;font-weight:500;color:#1a1a1a;margin-bottom:4px}
.bcard-desc{font-size:13px;color:#888;line-height:1.5;margin-bottom:8px}
/* code 區塊 — 複製 icon 懸浮右上，展開箭頭在底部 */
.bcard-code-wrap{position:relative}
.bcard-code{background:#f5f5f3;border:1px solid #e5e5e2;border-radius:8px;padding:8px 10px;font-family:'SF Mono',Consolas,monospace;font-size:12px;color:#1a1a1a;white-space:pre-wrap;word-break:break-all;line-height:1.7;max-height:80px;overflow:hidden}
.bcard-code.expanded{max-height:none}
.bcard-copy-btn{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:5px;background:rgba(255,255,255,.9);border:1px solid #e5e5e2;display:none;align-items:center;justify-content:center;cursor:pointer;color:#555}
.bcard-code-wrap:hover .bcard-copy-btn{display:flex}
.bcard-copy-btn:hover{background:#fff;border-color:#bbb}
.bcard-expand-btn{width:100%;display:flex;align-items:center;justify-content:center;padding:4px 0 0;cursor:pointer;color:#bbb;font-size:11px;gap:3px;margin-top:4px;background:none;border:none}
.bcard-expand-btn:hover{color:#888}

/* ===== 色碼庫 ===== */
.ui-section{margin-bottom:28px}
.ui-section-title{font-size:13px;font-weight:600;color:#555;margin-bottom:10px}
.ui-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ui-row{display:flex;align-items:stretch;background:#fff;border:1px solid #e5e5e2;border-radius:8px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.ui-row:hover{border-color:#bbb}
.ui-row.copied{border-color:#82be0f}
/* 左欄：色塊上緣切齊標題，Aa 預覽緊貼在下 */
.ui-left{display:flex;flex-direction:column;align-items:center;padding:12px;gap:6px;flex-shrink:0;width:64px;border-right:1px solid #f0f0ec}
.ui-swatch{width:40px;height:40px;border-radius:6px;border:1px solid rgba(0,0,0,.08);flex-shrink:0}
.ui-preview{font-size:12px;line-height:1;color:#888}
/* 右欄：名稱＋備註靠近（gap:6），code 與上方分開（margin-top:8） */
.ui-middle{flex:1;min-width:0;padding:12px 8px 12px 12px;display:flex;flex-direction:column;gap:6px}
.ui-name{font-size:13px;font-weight:500;color:#1a1a1a;line-height:1.3}
.ui-note{font-size:11px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.ui-note.empty{color:#ccc;font-style:italic}
.ui-codeline{font-family:'SF Mono',Consolas,monospace;font-size:11px;color:#555;background:#f5f5f3;padding:2px 6px;border-radius:4px;border:1px solid #ececea;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.6;display:block;margin-top:2px}
.ui-copy-btn{flex-shrink:0;width:32px;display:flex;align-items:center;justify-content:center;border-left:1px solid #f0f0ec;color:#bbb;transition:color .15s;background:transparent}
.ui-row:hover .ui-copy-btn{color:#888}
.ui-row.copied .ui-copy-btn{color:#82be0f}

/* ===== Checklist ===== */
.pbar{height:3px;background:#e5e5e2;border-radius:2px;margin-bottom:12px}
.pfill{height:100%;border-radius:2px;background:#639922;transition:width .3s}
.rbtn{font-size:13px;padding:4px 10px;border:1px solid #e5e5e2;border-radius:8px;background:transparent;color:#888;cursor:pointer;margin-left:auto}
.rbtn:hover{background:#f5f5f3}
.cl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.cl-sec{margin-bottom:16px}
.cl-hd{font-size:14px;font-weight:500;padding:8px 12px;border-radius:8px;margin-bottom:6px}
.cl-hd.danger{background:#FCEBEB;color:#A32D2D}
.cl-hd.info{background:#E6F1FB;color:#185FA5}
.cl-hd.success{background:#EAF3DE;color:#3B6D11}
.cl-hd.warn{background:#FAEEDA;color:#854F0B}
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:7px 10px;border-radius:8px;font-size:14px;color:#1a1a1a;line-height:1.5;cursor:pointer}
.cl-item:hover{background:#f5f5f3}
.cl-item.done{color:#bbb;text-decoration:line-through}
.cl-item.done .chkbox{background:#639922;border-color:#639922}
.chkbox{width:17px;height:17px;border:1.5px solid #ccc;border-radius:3px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center}
.tick{display:block;width:5px;height:8px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(1px,-1px)}
.pdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:6px}
.pr{background:#E24B4A}.pa{background:#EF9F27}.pb{background:#378ADD}

/* ===== 注意事項 ===== */
.nblk{background:#fff;border:1px solid #e5e5e2;border-radius:12px;padding:14px 16px;margin-bottom:10px}
.ntitle{font-size:14px;font-weight:500;color:#1a1a1a;margin-bottom:6px}
.ntext{font-size:13px;color:#666;line-height:1.7;white-space:pre-wrap}

/* ===== 問題圖記 — icon 化 ===== */
.igallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.icard{background:#fff;border:1px solid #e5e5e2;border-radius:12px;overflow:hidden;transition:border-color .15s,transform .18s,box-shadow .18s}
.icard:hover{border-color:#bbb;transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.08)}
.ithumb{width:100%;aspect-ratio:16/10;background:#f5f5f3;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;cursor:pointer}
.ithumb img{width:100%;height:100%;object-fit:cover;transition:transform .25s}
.icard:hover .ithumb img{transform:scale(1.06)}
/* 編輯 icon — 右上角 hover 才出現 */
.iedit-btn{position:absolute;top:6px;right:6px;width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,.88);border:1px solid rgba(0,0,0,.1);display:none;align-items:center;justify-content:center;cursor:pointer;color:#555;z-index:2;transition:background .15s}
.ithumb:hover .iedit-btn{display:flex}
.iedit-btn:hover{background:#fff}
.iph{display:flex;flex-direction:column;align-items:center;gap:5px;color:#bbb;font-size:12px;text-align:center;padding:8px}
.istrip{height:3px;flex-shrink:0}
.iinfo{padding:8px 11px 11px}
.ititle{font-size:14px;font-weight:500;color:#1a1a1a;line-height:1.4}
.icat-lbl{font-size:12px;color:#bbb;margin-top:2px}
.frow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.f-btn{padding:5px 11px;border:1px solid #e5e5e2;border-radius:20px;background:#fff;color:#888;font-size:13px;cursor:pointer}
.f-btn.on,.f-btn:hover{background:#f0f0ec;color:#1a1a1a}

/* ===== 情境模式 ===== */
.ctx-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px};gap:14px}
.ctx-card{background:#fff;border:1px solid #e5e5e2;border-radius:12px;overflow:hidden}
.ctx-card:hover{border-color:#ccc}
.ctx-head{padding:12px 14px;border-bottom:1px solid #f0f0ec;display:flex;align-items:center;gap:10px;cursor:pointer}
.ctx-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ctx-title{font-size:14px;font-weight:500;color:#1a1a1a;flex:1}
.ctx-count{font-size:11px;color:#bbb;background:#f5f5f3;padding:2px 7px;border-radius:10px}
.ctx-body{display:none;padding:10px 14px 14px}
.ctx-body.open{display:block}
.ctx-desc{font-size:13px;color:#888;margin-bottom:10px;line-height:1.6}
.ctx-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid #f5f5f3}
.ctx-item:last-child{border-bottom:none}
.ctx-item-name{font-size:13px;font-weight:500;color:#1a1a1a;width:120px;flex-shrink:0;line-height:1.5}
.ctx-item-code{font-family:'SF Mono',Consolas,monospace;font-size:11px;color:#555;background:#f5f5f3;padding:2px 6px;border-radius:4px;border:1px solid #ececea;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;line-height:1.6}
.ctx-item-code:hover{background:#ebebeb}
.ctx-tip{font-size:12px;color:#185FA5;background:#E6F1FB;padding:6px 10px;border-radius:8px;margin-top:10px;line-height:1.6}

/* ===== 新手教學 ===== */
.tut-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:20px}
.tut-card{background:#fff;border:1px solid #e5e5e2;border-radius:12px;overflow:hidden}
.tut-card:hover{border-color:#ccc}
.tut-hd{padding:11px 13px;display:flex;align-items:center;gap:8px;cursor:pointer}
.tut-num{width:22px;height:22px;border-radius:50%;background:#f0f0ec;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#888;flex-shrink:0}
.tut-title{font-size:14px;font-weight:500;color:#1a1a1a;flex:1}
.chev{font-size:11px;color:#bbb;transition:transform .18s;flex-shrink:0}
.chev.open{transform:rotate(90deg)}
.tut-body{display:none;padding:0 13px 14px;border-top:1px solid #f0f0ec}
.tut-body.open{display:block}
.tut-desc{font-size:13px;color:#555;line-height:1.7;margin:10px 0 8px;white-space:pre-wrap}
.tut-code{background:#f5f5f3;border:1px solid #e5e5e2;border-radius:8px;padding:9px 11px;font-family:'SF Mono',Consolas,monospace;font-size:12px;color:#1a1a1a;white-space:pre;overflow-x:auto;line-height:1.7;margin-top:6px;position:relative}
.tcpb{position:absolute;top:6px;right:6px;padding:2px 7px;font-size:11px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#888;cursor:pointer}
.tut-warn{font-size:13px;color:#854F0B;background:#FAEEDA;padding:7px 11px;border-radius:8px;margin-top:8px;line-height:1.6}
.tut-tip{font-size:13px;color:#185FA5;background:#E6F1FB;padding:7px 11px;border-radius:8px;margin-top:8px;line-height:1.6}
.tut-link{font-size:13px;color:#185FA5;margin-top:6px;display:block}
.tut-slbl{font-size:12px;font-weight:500;color:#888;margin:20px 0 8px}

/* ===== Modal ===== */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.imgzoom{max-width:92vw;max-height:92vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.5);cursor:zoom-out}
.modal{background:#fff;border-radius:16px;width:100%;max-width:640px;overflow:hidden;max-height:90vh;overflow-y:auto}
.mhead{padding:14px 16px;border-bottom:1px solid #f0f0ec;display:flex;align-items:center;gap:10px;position:sticky;top:0;background:#fff;z-index:2}
.mbadge{font-size:12px;padding:2px 8px;border-radius:20px;font-weight:500}
.mtitle{font-size:16px;font-weight:500;color:#1a1a1a;flex:1}
.xcls{width:28px;height:28px;border:1px solid #e5e5e2;border-radius:8px;background:transparent;color:#888;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.xcls:hover{background:#f5f5f3}
.mbody{padding:16px}
.uzone{width:100%;min-height:180px;border:1.5px dashed #ccc;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;cursor:pointer;margin-bottom:14px;position:relative;overflow:hidden;background:#f9f9f7}
.uzone:hover{border-color:#aaa}
.uzone img.prev{width:100%;height:100%;object-fit:contain;position:absolute;top:0;left:0;cursor:zoom-in}
.uzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.uhint{font-size:13px;color:#bbb;text-align:center;line-height:1.6;pointer-events:none}
.dlbl{font-size:13px;font-weight:500;color:#888;margin-bottom:5px;margin-top:10px}
.dta{width:100%;min-height:80px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;font-size:14px;line-height:1.6;resize:vertical;font-family:inherit}
.dta:focus,.cta:focus{outline:none;border-color:#aaa}
.cta{width:100%;min-height:70px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;background:#f5f5f3;color:#1a1a1a;font-size:13px;line-height:1.7;resize:vertical;font-family:'SF Mono',Consolas,monospace}
.svbtn{width:100%;padding:9px;border:1px solid #ddd;border-radius:8px;background:#f5f5f3;color:#1a1a1a;font-size:14px;cursor:pointer;margin-top:12px}
.svbtn:hover{background:#ebebeb}
.svok{display:none;font-size:12px;color:#3B6D11;background:#EAF3DE;padding:3px 10px;border-radius:10px;margin-top:6px;text-align:center}
.zoom-hint{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.45);color:#fff;font-size:11px;padding:2px 6px;border-radius:4px;pointer-events:none}

/* ===== Global search results ===== */
.gsearch-section{margin-bottom:20px}
.gsearch-section-title{font-size:11px;font-weight:500;color:#bbb;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.gsearch-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#fff;border:1px solid #e5e5e2;border-radius:8px;cursor:pointer;margin-bottom:6px}
.gsearch-item:hover{border-color:#bbb}
.gsearch-tag{font-size:11px;padding:2px 7px;border-radius:10px;background:#f5f5f3;color:#888;flex-shrink:0}
.gsearch-name{font-size:13px;font-weight:500;color:#1a1a1a;flex:1}
.gsearch-code{font-family:'SF Mono',Consolas,monospace;font-size:11px;color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.gsearch-empty{text-align:center;color:#bbb;padding:40px;font-size:14px}

/* ===== RWD ===== */
@media(max-width:700px){
  .wrap{padding:16px 12px}
  .ui-grid{grid-template-columns:1fr}
  .block-grid{grid-template-columns:1fr}
  .cl-grid{grid-template-columns:1fr}
  .tut-grid{grid-template-columns:1fr}
  .igallery{grid-template-columns:repeat(2,1fr)}
  .syntax-table th:last-child,.syntax-table td:last-child{display:none}
  .mtab{padding:6px 12px;font-size:13px}
  .global-search{max-width:160px}
}
</style>
</head>
<body>

<!-- ===== Sticky Header ===== -->
<div class="site-header">
  <div class="header-inner">
    <div class="header-top">
      <span class="site-title">HTML Email 工作手冊</span>
      <input class="global-search" id="gsearch" placeholder="搜尋全站…" oninput="doGlobalSearch(this.value)">
    </div>
    <!-- 主 TAB -->
    <div class="main-tabs">
      <button class="mtab active" onclick="setMainTab('ref',this)">語法庫</button>
      <button class="mtab" onclick="setMainTab('ui',this)">UI 規範</button>
      <button class="mtab" onclick="setMainTab('check',this)">Checklist</button>
      <button class="mtab" onclick="setMainTab('notes',this)">注意事項</button>
      <button class="mtab" onclick="setMainTab('tut',this)">新手教學</button>
    </div>
  </div>
  <!-- 子 TAB（語法庫才顯示） -->
  <div class="sub-bar" id="sub-bar">
    <div class="sub-bar-inner">
      <button class="stab active" onclick="setSubTab('syn',this)">快速語法</button>
      <button class="stab" onclick="setSubTab('ctx',this)">情境模式</button>
      <button class="stab" onclick="setSubTab('block',this)">區塊語法</button>
      <button class="stab" onclick="setSubTab('issues',this)">問題圖記</button>
    </div>
  </div>
</div>

<div class="wrap">

<!-- ===== 全域搜尋結果 ===== -->

const TUT_SECTIONS = [
  {title:'心態與原則',items:[
    {t:'寫 Email HTML 的心態',desc:`以方便上手為目的，code 建構方式很多，以自己習慣的邏輯去寫就好。\n\n• 建議以 code 為主要工具，email 有許多問題都必須用 code 解決\n• 一定要收測試信，並同時用手機檢查\n• 不用背下所有標籤，想用卻不知道怎麼用就 Google`},
    {t:'為什麼 Email HTML 這麼難？',desc:`Outlook 用 Microsoft Word 當 render engine，所以：\n• 只能用 CSS2，不能用 CSS3\n• 平常慣用的 flexbox、display:flex 通通不能用\n• SVG 不支援，圖片只能用 jpg、png、gif\n• 寫完要 inline CSS，但又要支援 RWD`,warn:'即使你已經能閉著眼睛刻一般網頁，在 Email 這塊還是要乖乖慢下來。'},
  ]},
  {title:'六大基礎規則',items:[
    {t:'規則 1：排版只能用 table',desc:'Email 不能用 div + flexbox，必須用 table 建構。一個 Block 就用一個 table 包，Block 間距用 td 的 padding（margin 在 table 上不成立）。',
     code:`<table width="700" border="0" cellspacing="0" cellpadding="0">
  <tr><td>內容</td></tr>
</table>`,tip:'所有 table 都要加上這四個屬性：border="0" cellspacing="0" cellpadding="0" width'},
    {t:'規則 2：CSS 要 inline',desc:'樣式要直接寫在標籤的 style="" 裡。\n\n例外：手機版 RWD 的 style 寫在 <head> 的 <style> 裡，而且一定要加 !important。'},
    {t:'規則 3：顏色要用六位數 hex',desc:'Email 只能用六位數 hex，不能縮寫或用 rgb()。',
     code:`/* 正確 */\ncolor: #ffffff;\n\n/* 錯誤，不支援 */\ncolor: #fff;\ncolor: rgb(255,255,255);`,warn:'bgcolor 這個 HTML 屬性在 email 仍然有效，可直接寫在 td 上。'},
    {t:'規則 4：對齊用 HTML 屬性',desc:'靠左靠右、置中要用 HTML 屬性，不用 CSS float/flex。',
     code:`<td align="center" valign="top">內容</td>\n<table align="right">...</table>`,warn:'Outlook 不支援 float，flexbox 在多數 email client 也很差。'},
    {t:'規則 5：針對 Outlook 另外寫',desc:'Outlook 用 Word 渲染，很多 CSS 會壞掉，需要用條件判斷：',
     code:`<!--[if mso]>\n  只有 Outlook 顯示\n<![endif]-->\n\n<!--[if !mso]><!-->\n  非 Outlook 顯示\n<!--<![endif]-->`,tip:'caniemail.com 可查詢各 CSS 屬性的支援程度。'},
    {t:'規則 6：table 必須 reset',desc:'建立 table 時一定要把預設值歸零：',
     code:`<table width="700" border="0" cellspacing="0" cellpadding="0">`,tip:'所有 table 都應該加這四個屬性。'},

function renderCtx(){
  const con=document.getElementById('ctx-container');
  if(!con)return;
  const intro=`<div style="font-size:13px;color:#888;margin-bottom:14px;line-height:1.6">每個情境是一組常一起用的語法「食譜」，點開展開，點 code 直接複製。</div>`;
  const cards=CTX_DATA.map((ctx,ci)=>{
    const id='ctx_'+ci;
    const rows=ctx.items.map(it=>{
      const safe=ESC2(it.c);
      return `<div class="ctx-item">
        <div class="ctx-item-name">${it.n}</div>
        <div class="ctx-item-code" onclick="cpyCtx(this,'${safe}')" title="點擊複製">${ESC(it.c)}</div>
      </div>`;
    }).join('');
    return `<div class="ctx-card">
      <div class="ctx-head" onclick="togCtx('${id}')">
        <div class="ctx-icon" style="background:${ctx.color}">${ctx.icon}</div>
        <span class="ctx-title">${ctx.title}</span>
        <span class="ctx-count">${ctx.items.length} 個語法</span>
        <span class="chev" id="ctxcv_${id}" style="margin-left:6px">&#9658;</span>
      </div>
      <div class="ctx-body" id="${id}">
        <div class="ctx-desc">${ctx.desc}</div>
        ${rows}
        ${ctx.tip?`<div class="ctx-tip">${ctx.tip}</div>`:''}
      </div>
    </div>`;
  }).join('');
  con.innerHTML=intro+'<div class="ctx-grid">'+cards+'</div>';
}
function togCtx(id){
  const b=document.getElementById(id),cv=document.getElementById('ctxcv_'+id);
  const o=b.classList.toggle('open');cv.classList.toggle('open',o);
}
function cpyCtx(el,code){
  navigator.clipboard.writeText(code).then(()=>{
    const prev=el.textContent;el.textContent='已複製！';el.style.background='#EAF3DE';el.style.color='#3B6D11';
    setTimeout(()=>{el.textContent=prev;el.style.background='';el.style.color='';},1400);
  });
}

function setMainTab(id,btn){
  curMainTab=id;
  document.querySelectorAll('.mtab').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  document.querySelectorAll('.wrap>.page').forEach(p=>p.style.display='none');
  const pg=document.getElementById(id);
  if(pg)pg.style.display='block';
  const sb=document.getElementById('sub-bar');
  if(sb)sb.classList.toggle('visible',id==='ref');
  document.getElementById('gsearch-page').style.display='none';
}
function setSubTab(id,btn){
  curSubTab=id;
  document.querySelectorAll('.sub-bar-inner .stab').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  document.querySelectorAll('#ref .subpage').forEach(p=>p.style.display='none');
  const sp=document.getElementById(id);
  if(sp)sp.style.display='block';
}

function doGlobalSearch(q){
  q=(q||'').trim().toLowerCase();
  const gp=document.getElementById('gsearch-page');
  if(!q){
    gp.style.display='none';
    setMainTab(curMainTab, document.querySelector('.mtab.active'));
    return;
  }
  document.querySelectorAll('.wrap>.page').forEach(p=>p.style.display='none');
  gp.style.display='block';
  const sb=document.getElementById('sub-bar');
  if(sb)sb.classList.remove('visible');

  let html='';
  const synHits=[];
  SYN_GROUPS.forEach(grp=>grp.items.forEach(it=>{
    if([it.n,(it.c||''),(it.note||'')].join(' ').toLowerCase().includes(q))
      synHits.push({tag:grp.label,name:it.n,code:it.c});
  }));
  if(synHits.length){
    html+=`<div class="gsearch-section"><div class="gsearch-section-title">快速語法</div>`;
    synHits.slice(0,6).forEach(h=>{html+=`<div class="gsearch-item" onclick="clearSearch();setMainTab('ref',document.querySelector('.mtab'));setSubTab('syn',document.querySelectorAll('.stab')[0])"><span class="gsearch-tag">${h.tag}</span><span class="gsearch-name">${h.name}</span><span class="gsearch-code">${ESC(h.code)}</span></div>`;});
    html+='</div>';
  }
  const blkHits=BLOCKS_DATA.filter(b=>[b.title,(b.desc||'')].join(' ').toLowerCase().includes(q));
  if(blkHits.length){
    html+=`<div class="gsearch-section"><div class="gsearch-section-title">區塊語法</div>`;
    blkHits.slice(0,4).forEach(b=>{html+=`<div class="gsearch-item" onclick="clearSearch();setMainTab('ref',document.querySelector('.mtab'));setSubTab('block',document.querySelectorAll('.stab')[2])"><span class="gsearch-tag">區塊</span><span class="gsearch-name">${b.title}</span><span class="gsearch-code">${ESC(b.desc||'')}</span></div>`;});
    html+='</div>';
  }
  const uiHits=[];
  UI_SECTIONS.forEach(sec=>{if(sec.items)sec.items.forEach(it=>{if([it.name,(it.note||''),(it.style||''),(it.cls||'')].join(' ').toLowerCase().includes(q))uiHits.push({tag:sec.label,name:it.name,code:it.style||''}); });});
  if(uiHits.length){
    html+=`<div class="gsearch-section"><div class="gsearch-section-title">UI 規範</div>`;
    uiHits.slice(0,5).forEach(h=>{html+=`<div class="gsearch-item" onclick="clearSearch();setMainTab('ui',document.querySelectorAll('.mtab')[1])"><span class="gsearch-tag">${h.tag}</span><span class="gsearch-name">${h.name}</span><span class="gsearch-code">${ESC(h.code)}</span></div>`;});
    html+='</div>';
  }
  const issHits=ISSUES.filter(x=>x.t.toLowerCase().includes(q));
  if(issHits.length){
    html+=`<div class="gsearch-section"><div class="gsearch-section-title">問題圖記</div>`;
    issHits.slice(0,4).forEach(iss=>{html+=`<div class="gsearch-item" onclick="clearSearch();setMainTab('ref',document.querySelector('.mtab'));setSubTab('issues',document.querySelectorAll('.stab')[3]);openIssue(${iss.id})"><span class="gsearch-tag">${ICATS[iss.c].l}</span><span class="gsearch-name">${iss.t}</span></div>`;});
    html+='</div>';
  }
  if(!html)html=`<div class="gsearch-empty">找不到「${q}」相關結果</div>`;
  document.getElementById('gsearch-results').innerHTML=html;
}
function clearSearch(){
  const el=document.getElementById('gsearch');
  if(el)el.value='';
}

function renderSyn(){
  const con=document.getElementById('syn-container');
  const html=SYN_GROUPS.map(grp=>{
    const trs=grp.items.map(x=>`<tr>
      <td><span class="syn-name">${x.n}</span></td>
      <td><span class="syn-code" onclick="copySyn(this,'${ESC2(x.c)}')" title="點擊複製">${ESC(x.c)}</span></td>
      <td><span class="syn-note">${x.note||''}</span></td>
    </tr>`).join('');
    return `<div class="section-lbl">${grp.label}</div>
    <table class="syntax-table" style="margin-bottom:16px">
      <thead><tr><th style="width:160px">名稱</th><th>code（點擊複製）</th><th style="width:140px">備註</th></tr></thead>
      <tbody>${trs}</tbody>
    </table>`;
  }).join('');
  con.innerHTML=html;
}

function copySyn(el,code){
  navigator.clipboard.writeText(code).then(()=>{
    const prev=el.textContent;
    el.textContent='已複製！';el.style.background='#EAF3DE';el.style.color='#3B6D11';
    setTimeout(()=>{el.textContent=prev;el.style.background='';el.style.color='';},1400);
  });
}

        ${img?`<div class="bcard-del-btn" title="刪除截圖" onclick="event.stopPropagation();deleteBlockImg('${b.id}')">${DEL_ICON}</div>`:''}
      </div>
      <div class="bcard-strip" style="background:${b.strip}"></div>
      <div class="bcard-body">
        <div class="bcard-title">${b.title}</div>
        <div class="bcard-desc">${b.desc}</div>
        <div class="bcard-code-wrap">
          <div class="bcard-code" id="bcode-${b.id}">${ESC(b.code)}</div>
          <div class="bcard-copy-btn" title="複製 code" onclick="copyBlock('${b.id}')">${COPY_ICON}</div>
        </div>
        <button class="bcard-expand-btn" id="bexp-${b.id}" onclick="toggleBlockCode('${b.id}')">
          ${EXPAND_ICON}<span>展開</span>
        </button>
      </div>
    </div>`;
  }).join('');
}

function copyBlock(id){
  const b=BLOCKS_DATA.find(x=>x.id===id);
  navigator.clipboard.writeText(b.code).then(()=>{
    const btn=document.querySelector(`#bcode-${id}`).parentElement.querySelector('.bcard-copy-btn');
    if(btn){btn.style.color='#3B6D11';btn.style.background='#EAF3DE';setTimeout(()=>{btn.style.color='';btn.style.background='';},1400);}
  });
}

function toggleBlockCode(id){
  const el=document.getElementById('bcode-'+id);
  const btn=document.getElementById('bexp-'+id);
  const expanded=el.classList.toggle('expanded');
  btn.innerHTML=expanded?`${COLLAPSE_ICON}<span>收合</span>`:`${EXPAND_ICON}<span>展開</span>`;
}

function uploadBlockImg(id,e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{blockImgs[id]=ev.target.result;try{localStorage.setItem('rl_bi',JSON.stringify(blockImgs));}catch(err){}renderBlocks();};
  r.readAsDataURL(file);
}

function deleteBlockImg(id){
  delete blockImgs[id];try{localStorage.setItem('rl_bi',JSON.stringify(blockImgs));}catch(e){}renderBlocks();
}

// ============================================================
// 問題圖記 — 點縮圖放大，鉛筆 icon 開編輯
// ============================================================
const PENCIL_ICON=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;

function renderIssueFilters(){
  const row=document.getElementById('iff');
  row.innerHTML=['all',...Object.keys(ICATS)].map(c=>{
    const l=c==='all'?'全部':ICATS[c].l;
    return `<button class="f-btn${iCat===c?' on':''}" onclick="setIC('${c}',this)">${l}</button>`;
  }).join('');
}
function setIC(cat,btn){iCat=cat;document.querySelectorAll('#iff .f-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderIssueGallery();}

function renderIssueGallery(){
  const g=document.getElementById('ig');
  const fi=ISSUES.filter(x=>iCat==='all'||x.c===iCat);
  if(!fi.length){g.innerHTML='<div style="text-align:center;color:#bbb;padding:32px;grid-column:1/-1">此分類暫無紀錄</div>';return;}
  g.innerHTML=fi.map(iss=>{
    const cat=ICATS[iss.c];const e=ieData[iss.id]||{};
    const thumbContent=e.img
      ?`<img src="${e.img}" alt="" style="width:100%;height:100%;object-fit:cover">`
      :`<div class="iph"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>點擊上傳截圖</div>`;
    const dot=(e.desc||e.code)?' <span style="font-size:10px;color:#3B6D11">&#9679;</span>':'';
    return `<div class="icard">
      <div class="ithumb" onclick="${e.img?`openImgZoom('${e.img}')`:'openIssue('+iss.id+')'}">
        ${thumbContent}
        <div class="iedit-btn" title="編輯筆記" onclick="event.stopPropagation();openIssue(${iss.id})">${PENCIL_ICON}</div>
      </div>
      <div class="istrip" style="background:${cat.s}"></div>
      <div class="iinfo">
        <div class="ititle">${iss.t}${dot}</div>
        <div class="icat-lbl">${cat.l}</div>
      </div>
    </div>`;
  }).join('');
}


// ============================================================
// UI 規範
// ============================================================
const COPY_ICON = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;

function renderUI(){
  const con=document.getElementById('ui-container');
  if(!con)return;
  con.innerHTML=UI_SECTIONS.map(sec=>{
    const subtitleEl=sec.note?`<div style="font-size:11px;color:#E24B4A;margin-bottom:10px;line-height:1.5">${sec.note}</div>`:'';
    if(sec.codeblock){
      const cards=sec.items.map(item=>{
        const uid='hs_'+item.name.replace(/[\s.:\-]/g,'');
        return `<div class="ui-row" id="${uid}" style="flex-direction:column;align-items:stretch;cursor:default;padding:0">
          <div style="display:flex;align-items:center;padding:7px 10px;gap:8px;border-bottom:1px solid #f0f0ec">
            <span style="font-size:12px;font-weight:500;color:#1a1a1a;flex:1">${item.name}</span>
            <button onclick="copyUI('${uid}_btn','${ESC2(item.code)}')" id="${uid}_btn"
              style="width:24px;height:24px;border:1px solid #e5e5e2;border-radius:5px;background:transparent;color:#bbb;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:color .15s">
              ${COPY_ICON}
            </button>
          </div>
          <pre style="margin:0;padding:8px 10px;font-family:'SF Mono',Consolas,monospace;font-size:10px;color:#1a1a1a;line-height:1.8;white-space:pre-wrap;word-break:break-all;background:#f5f5f3">${ESC(item.code)}</pre>
          <div style="padding:5px 10px;border-top:1px solid #f0f0ec">
            <span style="font-size:10px;color:${item.note?'#aaa':'#ccc'};font-style:${item.note?'normal':'italic'}">${item.note||'輸入備註...'}</span>
          </div>
        </div>`;
      }).join('');
      return `<div class="ui-section">
        <div class="ui-section-title">${sec.label}</div>
        ${subtitleEl}
        <div class="ui-grid" style="grid-template-columns:repeat(2,1fr)">${cards}</div>
      </div>`;
    }
    const cards=(sec.items||[]).map(item=>{
      if(item.swatchOnly){
        return `<div class="ui-row" style="cursor:default">
          <div class="ui-left"><div class="ui-swatch" style="${item.swatchStyle||'background:transparent'}"></div></div>
          <div class="ui-middle"><span class="ui-name" style="font-size:11px;color:#bbb">${item.name}</span></div>
        </div>`;
      }
      const swatchBg = item.hex ? `background:#${item.hex}` : (item.swatchStyle||'background:transparent');
      // 左欄 preview（Aa / Label 等），直接用 previewStyle 或純色
      const previewHtml = item.preview
        ? `<span class="ui-preview" style="${item.previewStyle||''}">${item.preview}</span>`
        : '';
      // 右欄：名稱 + 備註（一行截斷）+ code（margin-top:8 分隔）
      const noteHtml = item.note
        ? `<span class="ui-note" title="${item.note}">${item.note}</span>`
        : `<span class="ui-note empty">輸入備註...</span>`;
      const fullCode = item.fullcode || ((item.cls ? item.cls+' ' : '') + (item.style||''));
      const rowId = 'ur_'+item.name.replace(/[^a-z0-9]/gi,'');
      return `<div class="ui-row" id="${rowId}" onclick="copyUI('${rowId}','${ESC2(fullCode)}')">
        <div class="ui-left">
          <div class="ui-swatch" style="${swatchBg}"></div>
          ${previewHtml}
        </div>
        <div class="ui-middle">
          <span class="ui-name">${item.name}</span>
          ${noteHtml}
          <span class="ui-codeline">${ESC(fullCode)}</span>
        </div>
        <div class="ui-copy-btn">${COPY_ICON}</div>
      </div>`;
    }).join('');
    return `<div class="ui-section">
      <div class="ui-section-title">${sec.label}</div>
      ${subtitleEl}
      <div class="ui-grid">${cards}</div>
    </div>`;
  }).join('');
}

function copyUI(btnId,code){
  navigator.clipboard.writeText(code).then(()=>{
    const btn=document.getElementById(btnId);
    if(btn){
      const prev=btn.style.color;
      btn.style.color='#3B6D11';
      setTimeout(()=>btn.style.color=prev,1400);
    }
    const row=document.getElementById(btnId);
    if(row&&row.classList.contains('ui-row')){
      row.classList.add('copied');
      setTimeout(()=>row.classList.remove('copied'),1400);
    }
  });
}

function cpyRaw(code){
  navigator.clipboard.writeText(code).then(()=>{});
}

// ============================================================
// Checklist
// ============================================================
function renderCheck(){
  const grid=document.getElementById('cg');
  if(!grid)return;
  grid.innerHTML=Object.keys(CHECKS).map(title=>{
    const sec=CHECKS[title];
    const items=sec.items.map((it,i)=>{
      const k=title+'_'+i;const ck=ckState[k];
      const pd=it.p?`<span class="pdot p${it.p}"></span>`:`<span style="width:6px;flex-shrink:0"></span>`;
      return `<div class="cl-item${ck?' done':''}" onclick="tck('${title.replace(/'/g,"\'")}',${i})">
        <div class="chkbox">${ck?'<span class="tick"></span>':''}</div>${pd}<span>${it.t}</span></div>`;
    }).join('');
    return `<div class="cl-sec"><div class="cl-hd ${sec.cls}">${title}</div>${items}</div>`;
  }).join('');
  updProg();
}
function tck(t,i){const k=t+'_'+i;ckState[k]=!ckState[k];try{localStorage.setItem('rl_ck',JSON.stringify(ckState));}catch(e){}renderCheck();}
function resetCheck(){ckState={};try{localStorage.removeItem('rl_ck');}catch(e){}renderCheck();}
function updProg(){
  const tot=Object.keys(CHECKS).reduce((s,t)=>s+CHECKS[t].items.length,0);
  const done=Object.keys(ckState).filter(k=>ckState[k]).length;
  const pct=tot?Math.round(done/tot*100):0;
  const pf=document.getElementById('pf');
  const pt=document.getElementById('pt');
  if(pf)pf.style.width=pct+'%';
  if(pt)pt.textContent=done+'/'+tot;
}

// 注意事項

function renderNotes(){
  const el=document.getElementById('nc');
  if(!el)return;
  el.innerHTML=NOTES.map(n=>`<div class="nblk"><div class="ntitle">${n.t}</div><div class="ntext">${n.b}</div></div>`).join('');
}

function renderTut(){
  const el=document.getElementById('tc');
  if(!el)return;
  el.innerHTML=TUT_SECTIONS.map((sec,si)=>{
    const cards=sec.items.map((item,ii)=>{
      const id=`t${si}_${ii}`;
      return `<div class="tut-card">
        <div class="tut-hd" onclick="togTut('${id}')">
          <div class="tut-num">${ii+1}</div>
          <span class="tut-title">${item.t}</span>
          <span class="chev" id="tcv_${id}">&#9658;</span>
        </div>
        <div class="tut-body" id="tcb_${id}">
          <p class="tut-desc">${item.desc}</p>
          ${item.code?`<div class="tut-code" id="tc_${id}">${ESC(item.code)}<button class="tcpb" onclick="cpyTut('tc_${id}',event)">複製</button></div>`:''}
          ${item.warn?`<div class="tut-warn">${item.warn}</div>`:''}
          ${item.tip?`<div class="tut-tip">${item.tip}</div>`:''}
          ${item.link?`<a class="tut-link" href="${item.link}" target="_blank">${item.link}</a>`:''}
        </div>
      </div>`;
    }).join('');
    return `<div class="tut-slbl">${sec.title}</div><div class="tut-grid">${cards}</div>`;
  }).join('');
}
function togTut(id){const cb=document.getElementById('tcb_'+id),cv=document.getElementById('tcv_'+id);const o=cb.classList.toggle('open');cv.classList.toggle('open',o);}
function cpyTut(id,e){e.stopPropagation();const el=document.getElementById(id);const t=el.innerText.replace('複製','').trim();navigator.clipboard.writeText(t).then(()=>{const b=el.querySelector('.tcpb');b.textContent='已複製';setTimeout(()=>b.textContent='複製',1500);});}

// ============================================================
// 問題圖記 — openIssue / closeIssueModal / handleImg / saveIssue
// ============================================================
function openIssue(id){
  curIssueId=id;
  const iss=ISSUES.find(x=>x.id===id);const cat=ICATS[iss.c];const e=ieData[id]||{};
  document.getElementById('m-title').textContent=iss.t;
  const mb=document.getElementById('m-badge');mb.textContent=cat.l;mb.style.background=cat.bg;mb.style.color=cat.fg;
  document.getElementById('m-desc').value=e.desc||'';
  document.getElementById('m-code').value=e.code||'';
  const uz=document.getElementById('uzone');const uh=document.getElementById('uhint');
  const pv=uz.querySelector('img.prev');if(pv)pv.remove();
  const zh=uz.querySelector('.zoom-hint');if(zh)zh.remove();
  if(e.img){
    const img=document.createElement('img');img.src=e.img;img.className='prev';
    img.style.cssText='width:100%;height:100%;object-fit:contain;position:absolute;top:0;left:0;cursor:zoom-in';
    img.onclick=ev=>{ev.stopPropagation();openImgZoom(e.img);};
    uz.appendChild(img);
    const hint=document.createElement('div');hint.className='zoom-hint';hint.textContent='點擊放大';
    uz.appendChild(hint);
    uh.style.display='none';
  } else {uh.style.display='flex';}
  document.getElementById('svok').style.display='none';
  document.getElementById('issue-overlay').classList.add('open');
}
function closeIssueModal(){document.getElementById('issue-overlay').classList.remove('open');curIssueId=null;}
function handleIssueBg(e){if(e.target===document.getElementById('issue-overlay'))closeIssueModal();}
function handleImg(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    if(!ieData[curIssueId])ieData[curIssueId]={};
    ieData[curIssueId].img=ev.target.result;
    saveIeData();
    const uz=document.getElementById('uzone');const uh=document.getElementById('uhint');
    const pv=uz.querySelector('img.prev');if(pv)pv.remove();
    const zh=uz.querySelector('.zoom-hint');if(zh)zh.remove();
    const img=document.createElement('img');img.src=ev.target.result;img.className='prev';
    img.style.cssText='width:100%;height:100%;object-fit:contain;position:absolute;top:0;left:0;cursor:zoom-in';
    img.onclick=ev2=>{ev2.stopPropagation();openImgZoom(ev.target.result);};
    uz.appendChild(img);
    const hint=document.createElement('div');hint.className='zoom-hint';hint.textContent='點擊放大';
    uz.appendChild(hint);
    uh.style.display='none';
    renderIssueGallery();
  };
  r.readAsDataURL(file);
}
function saveIssue(){
  if(!curIssueId)return;
  if(!ieData[curIssueId])ieData[curIssueId]={};
  ieData[curIssueId].desc=document.getElementById('m-desc').value;
  ieData[curIssueId].code=document.getElementById('m-code').value;
  saveIeData();renderIssueGallery();
  const ok=document.getElementById('svok');ok.style.display='block';setTimeout(()=>ok.style.display='none',2000);
}
function saveIeData(){try{localStorage.setItem('rl_ie',JSON.stringify(ieData));}catch(e){}}

// ============================================================
// 圖片放大 Overlay
// ============================================================
function openImgZoom(src){
  document.getElementById('img-zoom-el').src=src;
  document.getElementById('img-overlay').classList.add('open');
}
function closeImgOverlay(){document.getElementById('img-overlay').classList.remove('open');}

// ============================================================
// UTIL
// ============================================================
function ESC(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ESC2(s){return String(s).replace(/'/g,'&#39;').replace(/"/g,'&quot;');}

// ============================================================
renderSyn();renderCtx();renderBlocks();renderUI();renderCheck();renderNotes();renderIssueFilters();renderIssueGallery();renderTut();
document.getElementById('sub-bar').classList.add('visible');
setSubTab('syn', document.querySelector('.stab'));
